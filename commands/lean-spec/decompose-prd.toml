description = "Generate feature skeletons (features/<slug>/ with workflow.json + spec stub) from docs/PRD.md"

prompt = """
Arguments: `{{args}}`  (optional path to PRD; defaults to docs/PRD.md)

**Coupling check (before generating slugs):** Count the `### 4.x` subsections in the PRD. If there are more than 4 AND they appear to share a single state store (typical UI apps), pause and say:

> "Found N features. For UI apps sharing a single state store, lean-spec recommends 1–3 cohesive features to minimise scope creep. Consider merging tightly-coupled sections into one feature (e.g. `task-manager`). Reply with a revised list or type `proceed` to continue."

Wait for user confirmation before running the bash block below.

!{
python3 << 'PYEOF'
import json, sys, os, re, datetime

args = '{{args}}'.strip()
prd_path = args if args else 'docs/PRD.md'

if not os.path.exists(prd_path):
    print(f"PRD not found at '{prd_path}'. Run /lean-spec:brainstorm first.")
    sys.exit(1)

def slugify(heading):
    s = re.sub(r'^[0-9]+(\\.[0-9]+)*\\s+', '', heading)
    s = re.sub(r'^[0-9]+\\)\\s+', '', s)
    s = s.lower()
    s = re.sub(r'[^a-z0-9]+', '-', s)
    return s.strip('-')

headings = []
in_features = False
with open(prd_path) as f:
    for line in f:
        line = line.rstrip('\\n')
        if line.startswith('## '):
            title = line[3:].strip()
            if re.match(r'^([0-9]+\\.\\s+)?Features\\s*$', title):
                in_features = True
            else:
                if in_features:
                    break
                in_features = False
        elif in_features and line.startswith('### '):
            headings.append(line[4:].strip())

if not headings:
    print(f"No Features section found in {prd_path} (expected '## <N>. Features' with '### <N>.<M> <title>' sub-sections).")
    sys.exit(1)

now = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
created = 0
skipped = 0

for heading in headings:
    if not heading:
        continue
    slug = slugify(heading)
    dir_path = f"features/{slug}"
    if os.path.isdir(dir_path):
        print(f"skip {slug} — exists")
        skipped += 1
        continue
    os.makedirs(dir_path, exist_ok=True)
    wf = {
        "slug": slug, "phase": "specifying",
        "created_at": now, "updated_at": now,
        "history": [{"phase": "specifying", "entered_at": now}],
        "artifacts": {"spec": "spec.md", "notes": "notes.md", "review": "review.md"}
    }
    with open(f"{dir_path}/workflow.json", 'w') as f:
        json.dump(wf, f, indent=2)
    spec = f'''---
slug: {slug}
phase: specifying
handoffs:
  next_command: /lean-spec:submit-implementation {slug}
  blocks_on: []   # list sibling slugs this feature depends on
  consumed_by: [coder, reviewer]
---

# {heading}

> Skeleton from /lean-spec:decompose-prd. Run /lean-spec:update-spec {slug} to complete.

## Scope
(see PRD §{heading})

## Acceptance Criteria
## Out of Scope
## Technical Notes
## Coder Guardrails
'''
    with open(f"{dir_path}/spec.md", 'w') as f:
        f.write(spec)
    print(f"created features/{slug}/")
    created += 1

print()
print(f"Done. {created} skeleton(s) created, {skipped} already existed.")
print("Note: Claude Code native version also auto-generates .lean-spec/rules.yaml and warns about")
print("cross-feature dependencies. This degraded port omits both — check blocks_on manually.")
print("Next: /lean-spec:update-spec <slug> per feature.")
PYEOF
}

After the bash block, scan `docs/PRD.md` for design token definitions (colour palette table, typography scale, or Tailwind `@theme inline`). If found, emit:

> **Design token check:** `docs/PRD.md` defines a design token system. The **first** feature's `spec.md` must include this Acceptance Criterion after the architect runs:
> > All PRD design tokens are declared in `app/globals.css` under `@theme inline { ... }` before any component renders. No component may reference a colour/font token not declared there.
> Without this AC, Tailwind v4 silently drops unknown utilities and all visual ACs fail.
"""
