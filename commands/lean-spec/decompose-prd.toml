description = "Generate feature skeletons (features/<slug>/ with workflow.json + spec stub) from docs/PRD.md"

prompt = """
Arguments: `{{args}}`  (optional path to PRD; defaults to docs/PRD.md)

**Coupling check (before generating slugs):** Count the `### 4.x` subsections in the PRD. If there are more than 4 AND they appear to share a single state store (typical UI apps), pause and say:

> "Found N features. For UI apps sharing a single state store, lean-spec recommends 1–3 cohesive features to minimise scope creep. Consider merging tightly-coupled sections into one feature (e.g. `task-manager`). Reply with a revised list or type `proceed` to continue."

Wait for user confirmation before running the bash block below.

!{
PRD="${1:-docs/PRD.md}"
ARGS='{{args}}'
[ -n "$ARGS" ] && PRD="$ARGS"

if [ ! -f "$PRD" ]; then
  echo "PRD not found at '$PRD'. Run /lean-spec:brainstorm first."
  exit 1
fi

# Inline slugifier (no external deps)
slugify() {
  local s="$1"
  s=$(echo "$s" | sed -E 's/^[0-9]+(\\.[0-9]+)*[[:space:]]+//; s/^[0-9]+\\)[[:space:]]+//')
  s=$(echo "$s" | tr '[:upper:]' '[:lower:]')
  s=$(echo "$s" | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')
  echo "$s"
}

# Extract feature headings from the Features section
HEADINGS=$(awk '
  BEGIN { in_features = 0 }
  /^## / {
    if (in_features) exit
    if ($0 ~ /^##[[:space:]]+([0-9]+\\.[[:space:]]+)?Features[[:space:]]*$/) in_features = 1
    else in_features = 0
    next
  }
  in_features && /^### / { sub(/^### /, ""); print }
' "$PRD")

if [ -z "$HEADINGS" ]; then
  echo "No Features section found in $PRD (expected '## <N>. Features' with '### <N>.<M> <title>' sub-sections)."
  exit 1
fi

NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
CREATED=0
SKIPPED=0

while IFS= read -r HEADING; do
  [ -z "$HEADING" ] && continue
  SLUG=$(slugify "$HEADING")
  DIR="features/$SLUG"
  if [ -d "$DIR" ]; then
    echo "skip $SLUG — exists"
    SKIPPED=$((SKIPPED + 1))
    continue
  fi
  mkdir -p "$DIR"
  cat > "$DIR/workflow.json" <<EOF
{
  "slug": "$SLUG",
  "phase": "specifying",
  "created_at": "$NOW",
  "updated_at": "$NOW",
  "history": [{"phase": "specifying", "entered_at": "$NOW"}],
  "artifacts": {"spec": "spec.md", "notes": "notes.md", "review": "review.md"}
}
EOF
  cat > "$DIR/spec.md" <<EOF
---
slug: $SLUG
phase: specifying
handoffs:
  next_command: /lean-spec:submit-implementation $SLUG
  blocks_on: []   # list sibling slugs this feature depends on
  consumed_by: [coder, reviewer]
---

# $HEADING

> 🚧 Skeleton from /lean-spec:decompose-prd. Run /lean-spec:update-spec $SLUG to complete.

## Scope
(see PRD §$HEADING)

## Acceptance Criteria
## Out of Scope
## Technical Notes
## Coder Guardrails
EOF
  echo "created features/$SLUG/"
  CREATED=$((CREATED + 1))
done <<< "$HEADINGS"

echo ""
echo "Done. $CREATED skeleton(s) created, $SKIPPED already existed."
echo "Note: Claude Code native version also auto-generates .lean-spec/rules.yaml and warns about"
echo "cross-feature dependencies. This degraded port omits both — check blocks_on manually."
echo "Next: /lean-spec:update-spec <slug> per feature."
}

After the bash block, scan `docs/PRD.md` for design token definitions (colour palette table, typography scale, or Tailwind `@theme inline`). If found, emit:

> **Design token check:** `docs/PRD.md` defines a design token system. The **first** feature's `spec.md` must include this Acceptance Criterion after the architect runs:
> > All PRD design tokens are declared in `app/globals.css` under `@theme inline { ... }` before any component renders. No component may reference a colour/font token not declared there.
> Without this AC, Tailwind v4 silently drops unknown utilities and all visual ACs fail.
"""
