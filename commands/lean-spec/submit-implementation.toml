description = "Advance feature from specifying to implementing and produce notes.md (pass --no-rules to skip rules validation)"

prompt = """
You are acting as the Coder for a lean-spec v3 feature. In Gemini mode there is no subagent dispatch — you are the main session AND the coder.

Arguments: `{{args}}`  (the feature slug)

## Step 1 — Validate phase + advance

!{
python3 $HOME/.gemini/extensions/lean-spec/bin/submit_implementation.py "{{args}}"
}

# Note: model overrides in rules.yaml do not apply in Gemini (fixed model).
## Step 2 — Implement

Read `features/<slug>/spec.md` fully. Every AC must be satisfied — no more, no less. Follow the spec's `Coder Guardrails` section (known footguns) as hard constraints.

Honor the hard-forbidden edits list:
- NEVER modify `package.json`, lockfiles, `next.config.*`, `tsconfig.json`, `eslint.config.*`, `postcss.config.*`, `tailwind.config.*`, root `app/layout.tsx` metadata, or existing tests unless the spec explicitly names them.
- NEVER create git branches, run `git checkout -b`, `git branch`, `git switch -c`, or any variant that creates or switches branches. Implementation stays on the current branch.

If a Playwright MCP is loaded, run a smoke-test before finishing:
1. Detect the dev server URL (spec.md Technical Notes; default `http://localhost:3000`).
2. If the server isn't already running, start it with plain `&` backgrounding + record `$!` to `/tmp/lean-spec-$SLUG-dev.pid`. Use `ps -o pgid= -p $PID` + `kill -TERM -$PGID` on exit to catch child processes. Never `setsid` (Linux-only).
3. Navigate, verify 0 console errors, named UI elements present.
4. If you started the server, kill it.

## Step 3 — Write notes.md

Produce `features/<slug>/notes.md` with this shape (see `agents/coder.md` for the canonical template):

```markdown
---
slug: <slug>
phase: implementing
handoffs:
  next_command: /lean-spec:submit-review <slug>
  blocks_on: []
  consumed_by: [reviewer]
---

# Implementation Notes: <slug>

## What was built
<!-- 3-5 bullets -->

## How to verify
<!-- Step-by-step mapped to each AC -->

## Decisions made
## Known limitations
```

## Step 4 — Hand off

Tell the user: "Implementation complete. Run `/lean-spec:submit-review <slug>`."
"""
