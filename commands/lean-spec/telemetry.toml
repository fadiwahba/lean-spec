description = "Print per-feature phase durations from the opt-in telemetry log (read-only in Gemini — no Stop-hook sync)"

prompt = """
Arguments: `{{args}}`  (optional slug to filter; empty = all features)

!{
LEAN_HOME="${HOME}/.lean-spec"
TFILE="$LEAN_HOME/telemetry.jsonl"
MARKER="$LEAN_HOME/telemetry"

if [ ! -f "$MARKER" ] && [ "${LEAN_SPEC_TELEMETRY:-0}" != "1" ]; then
  echo "Telemetry is disabled."
  echo ""
  echo "Enable (persistent):  mkdir -p ~/.lean-spec && echo on > ~/.lean-spec/telemetry"
  echo "Enable (session):     export LEAN_SPEC_TELEMETRY=1"
  echo ""
  echo "Gemini CLI note: the Stop hook is unavailable, so records are written by"
  echo "each host command at phase-advance time rather than on session end."
  exit 0
fi

if [ ! -f "$TFILE" ]; then
  echo "No telemetry data yet (log is empty)."
  exit 0
fi

FILTER='{{args}}'
if [ -n "$FILTER" ]; then
  jq -r --arg s "$FILTER" \
    'select(.slug == $s) | [.slug, (.prev_phase + " to " + .phase), ((.elapsed_prev_ms // "?") | tostring) + "ms"] | @tsv' \
    "$TFILE" | column -t
else
  jq -r '[.slug, (.prev_phase + " to " + .phase), ((.elapsed_prev_ms // "?") | tostring) + "ms"] | @tsv' \
    "$TFILE" | column -t
fi
}
"""
