description = "Advance to reviewing and produce review.md with APPROVE | NEEDS_FIXES | BLOCKED verdict (pass --visual for Playwright check, --no-rules to skip rules validation)"

prompt = """
You are acting as the Reviewer for a lean-spec v3 feature. In Gemini mode there is no subagent dispatch — you are the main session AND the reviewer.

Arguments: `{{args}}`  (first token = slug; optional `--visual` flag; rest = optional extras like `security performance` or `full`)

## Step 1 — Parse args, validate phase, advance

!{
python3 << 'PYEOF'
import json, sys, os, datetime, glob

args_raw = '{{args}}'
parts = args_raw.split()
slug = next((p for p in parts if not p.startswith('--')), '')
visual = '--visual' in parts
extras = [p for p in parts if not p.startswith('--') and p != slug]

if not slug:
    print("Usage: /lean-spec:submit-review <slug> [--visual]")
    sys.exit(1)

wf_path = f"features/{slug}/workflow.json"
if not os.path.exists(wf_path):
    print(f"Feature '{slug}' not found.")
    sys.exit(1)

with open(wf_path) as f:
    data = json.load(f)

current = data.get('phase', '')
if current != 'implementing':
    print(f"Phase gate: expected 'implementing', got '{current}'")
    sys.exit(1)

if not os.path.exists(f"features/{slug}/notes.md"):
    print(f"notes.md not found. Run /lean-spec:submit-implementation {slug} first.")
    sys.exit(1)

review_dir = f"features/{slug}"
review_path = f"{review_dir}/review.md"
if os.path.exists(review_path):
    existing = glob.glob(f"{review_dir}/review-cycle-*.md")
    next_num = len(existing) + 1
    os.rename(review_path, f"{review_dir}/review-cycle-{next_num}.md")

now = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
data['phase'] = 'reviewing'
data['updated_at'] = now
data['history'].append({'phase': 'reviewing', 'entered_at': now})

tmp = wf_path + '.tmp'
with open(tmp, 'w') as f:
    json.dump(data, f, indent=2)
os.replace(tmp, wf_path)
extras_str = ' '.join(extras) if extras else 'none'
print(f"phase advanced: implementing → reviewing (visual: {'yes' if visual else 'no'}, extras: {extras_str})")
PYEOF
}

# Note: model overrides in rules.yaml do not apply in Gemini (fixed model).
## Step 2 — Run review pipeline

**Default skills (always run):**
1. `skills/reviewing-spec-compliance/SKILL.md` — for each AC in the spec, is it fully satisfied? missing? over-implemented? Cite code `file:line`.
2. `skills/reviewing-code-quality/SKILL.md` — conventions, bugs, security, error handling, complexity. Group findings Critical / Important / Minor.

**Scope-violation sweep (mandatory, Critical when found):** Run `git diff --name-only <base>` and check each touched file against the coder's hard-forbidden list (`package.json`, lockfiles, framework configs, root `layout.tsx`, existing tests). Any unexpected edit is a Critical finding.

**Visual fidelity (only if `--visual` was passed in args):** If `$VISUAL=yes`, navigate the dev server, screenshot to `.playwright-mcp/<name>.png`, spot-check tokens via `getComputedStyle`, zero tolerance on console errors. If `$VISUAL=no`, note `Visual fidelity: skipped (use --visual flag or /lean-spec:visual-check <slug>)` in the Summary.

**Extras (opt-in via the args):**
- `security` → load `skills/reviewing-security/SKILL.md`, produce `## Security Review` section
- `performance` → load `skills/reviewing-performance/SKILL.md`, produce `## Performance Review` section
- `full` → all available `reviewing-*` extras

## Step 3 — Write review.md

```markdown
---
slug: <slug>
phase: reviewing
handoffs:
  next_command: /lean-spec:close-spec <slug>  # or submit-fixes if NEEDS_FIXES
  blocks_on: []
  consumed_by: [architect]
verdict: APPROVE | NEEDS_FIXES | BLOCKED
---

# Review: <slug>

## Verdict: APPROVE | NEEDS_FIXES | BLOCKED

## Spec Compliance
| Criterion | Status | Notes |

## Code Quality
### Critical
### Important
### Minor

## Visual Fidelity   (IFF --visual was passed; otherwise one-line skip note)

## Security Review | Performance Review   (IFF extras requested)

## Summary
```

Update `handoffs.next_command` per verdict:
- `APPROVE` → `/lean-spec:close-spec <slug>`
- `NEEDS_FIXES` → `/lean-spec:submit-fixes <slug>`
- `BLOCKED` → leave blank; human decision required

## Step 4 — Hand off

Tell the user the verdict and the next command.
"""
