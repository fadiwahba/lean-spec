description = "Advance to reviewing and produce review.md with APPROVE | NEEDS_FIXES | BLOCKED verdict (pass --visual for Playwright check, --no-rules to skip rules validation)"

prompt = """
You are acting as the Reviewer for a lean-spec v3 feature. In Gemini mode there is no subagent dispatch тАФ you are the main session AND the reviewer.

Arguments: `{{args}}`  (first token = slug; optional `--visual` flag; rest = optional extras like `security performance` or `full`)

## Step 1 тАФ Parse args, validate phase, advance

!{
python3 $HOME/.gemini/extensions/lean-spec/bin/submit_review.py "{{args}}"
}

# Note: model overrides in rules.yaml do not apply in Gemini (fixed model).
## Step 2 тАФ Run review pipeline

**Default skills (always run):**
1. `skills/reviewing-spec-compliance/SKILL.md` тАФ for each AC in the spec, is it fully satisfied? missing? over-implemented? Cite code `file:line`.
2. `skills/reviewing-code-quality/SKILL.md` тАФ conventions, bugs, security, error handling, complexity. Group findings Critical / Important / Minor.

**Scope-violation sweep (mandatory, Critical when found):** Run `git diff --name-only <base>` and check each touched file against the coder's hard-forbidden list (`package.json`, lockfiles, framework configs, root `layout.tsx`, existing tests). Any unexpected edit is a Critical finding.

**Visual fidelity (only if `--visual` was passed in args):** If `$VISUAL=yes`, navigate the dev server, screenshot to `.playwright-mcp/<name>.png`, spot-check tokens via `getComputedStyle`, zero tolerance on console errors. If `$VISUAL=no`, note `Visual fidelity: skipped (use --visual flag or /lean-spec:visual-check <slug>)` in the Summary.

**Extras (opt-in via the args):**
- `security` тЖТ load `skills/reviewing-security/SKILL.md`, produce `## Security Review` section
- `performance` тЖТ load `skills/reviewing-performance/SKILL.md`, produce `## Performance Review` section
- `full` тЖТ all available `reviewing-*` extras

## Step 3 тАФ Write review.md

```markdown
---
slug: <slug>
phase: reviewing
handoffs:
  next_command: /lean-spec:close-spec <slug>  # or submit-fixes if NEEDS_FIXES
  blocks_on: []
  consumed_by: [architect]
verdict: APPROVE | NEEDS_FIXES | BLOCKED
---

# Review: <slug>

## Verdict: APPROVE | NEEDS_FIXES | BLOCKED

## Spec Compliance
| Criterion | Status | Notes |

## Code Quality
### Critical
### Important
### Minor

## Visual Fidelity   (IFF --visual was passed; otherwise one-line skip note)

## Security Review | Performance Review   (IFF extras requested)

## Summary
```

Update `handoffs.next_command` per verdict:
- `APPROVE` тЖТ `/lean-spec:close-spec <slug>`
- `NEEDS_FIXES` тЖТ `/lean-spec:submit-fixes <slug>`
- `BLOCKED` тЖТ leave blank; human decision required

## Step 4 тАФ Hand off

Tell the user the verdict and the next command.
"""
