description = "Re-prime conversation context for an in-progress feature (read spec/notes/review)"

prompt = """
Arguments: `{{args}}`  (the feature slug)

!{
python3 << 'PYEOF'
import json, sys, os

slug = '{{args}}'.strip()
if not slug:
    print("Usage: /lean-spec:resume-spec <slug>")
    sys.exit(1)

proj = os.getcwd()
wf_path = os.path.join(proj, 'features', slug, 'workflow.json')
if not os.path.exists(wf_path):
    print(f"Feature '{slug}' not found. /lean-spec:spec-status for available features.")
    sys.exit(1)

print("=== workflow.json ===")
with open(wf_path) as f:
    data = json.load(f)
print(json.dumps(data, indent=2))

for fname in ('spec.md', 'notes.md', 'review.md'):
    fpath = os.path.join(proj, 'features', slug, fname)
    if os.path.exists(fpath):
        print()
        print(f"=== {fname} ===")
        with open(fpath) as f:
            print(f.read(), end='')
PYEOF
}

After reading the above, tell the user:
- Current phase
- A one-sentence summary of where we are (e.g. "spec drafted, coder hasn't started" or "review cycle 2 flagged NEEDS_FIXES — fix the 2 Important findings")
- The exact next command to run (same mapping as `/lean-spec:spec-status`)
"""
