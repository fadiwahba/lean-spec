description = "Roll reviewing feature back to implementing and address reviewer findings"

prompt = """
You are acting as the Coder for a lean-spec v3 feature. In Gemini mode there is no subagent dispatch.

Arguments: `{{args}}`  (the feature slug)

## Step 1 — Validate phase + roll back

!{
python3 << 'PYEOF'
import json, sys, os, datetime

slug = '{{args}}'.split()[0] if '{{args}}'.strip() else ''
if not slug:
    print("Usage: /lean-spec:submit-fixes <slug>")
    sys.exit(1)

wf_path = f"features/{slug}/workflow.json"
if not os.path.exists(wf_path):
    print(f"Feature '{slug}' not found.")
    sys.exit(1)

with open(wf_path) as f:
    data = json.load(f)

current = data.get('phase', '')
if current != 'reviewing':
    print(f"Phase gate: expected 'reviewing', got '{current}'")
    sys.exit(1)

review_path = f"features/{slug}/review.md"
if not os.path.exists(review_path):
    print(f"review.md not found. Run /lean-spec:submit-review {slug} first.")
    sys.exit(1)

verdict = ''
with open(review_path) as f:
    for line in f:
        if line.startswith('verdict:'):
            verdict = line.split(':', 1)[1].strip().replace(' ', '')
            break

if verdict != 'NEEDS_FIXES':
    print(f"Verdict is '{verdict}' — submit-fixes is only valid when review.md verdict is NEEDS_FIXES.")
    sys.exit(1)

now = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
data['phase'] = 'implementing'
data['updated_at'] = now
data['history'].append({'phase': 'implementing', 'entered_at': now})

tmp = wf_path + '.tmp'
with open(tmp, 'w') as f:
    json.dump(data, f, indent=2)
os.replace(tmp, wf_path)
print("phase rolled back: reviewing → implementing")
PYEOF
}

## Step 2 — Apply fixes

Apply fixes with **direct file edits only** — never via generated scripts, Node.js, shell scripts, or base64 pipes.

Read `features/<slug>/review.md` — every Critical and Important finding must be addressed. Read `features/<slug>/notes.md` (existing implementation notes) but DO NOT replace it.

Honor the hard-forbidden edits list (same as submit-implementation).

## Step 3 — APPEND to notes.md (don't rewrite — post-experiment fix #80)

Count existing `## Cycle \\d+ fixes` headings in `notes.md`. Compute `N = count + 1`. Append:

```markdown

## Cycle <N> fixes

### Addressing review.md findings

| Finding | Severity | Fix | File:line |
|---|---|---|---|
| <paraphrase of reviewer finding 1> | Critical/Important/Minor | <one-line fix summary> | `path/to/file.ts:L-L` |

### Other notes (if any)
```

## Step 4 — Hand off

Tell the user: "Fixes applied. Run `/lean-spec:submit-review <slug>` to re-review."
"""
