description = "Roll reviewing feature back to implementing and address reviewer findings"

prompt = """
You are acting as the Coder for a lean-spec v3 feature. In Gemini mode there is no subagent dispatch.

Arguments: `{{args}}`  (the feature slug)

## Step 1 — Validate phase + roll back

!{
python3 $HOME/.gemini/extensions/lean-spec/bin/submit_fixes.py "{{args}}"
}

## Step 2 — Apply fixes

Apply fixes with **direct file edits only** — never via generated scripts, Node.js, shell scripts, or base64 pipes.

Read `features/<slug>/review.md` — every Critical and Important finding must be addressed. Read `features/<slug>/notes.md` (existing implementation notes) but DO NOT replace it.

Honor the hard-forbidden edits list (same as submit-implementation).

## Step 3 — APPEND to notes.md (don't rewrite — post-experiment fix #80)

Count existing `## Cycle \\d+ fixes` headings in `notes.md`. Compute `N = count + 1`. Append:

```markdown

## Cycle <N> fixes

### Addressing review.md findings

| Finding | Severity | Fix | File:line |
|---|---|---|---|
| <paraphrase of reviewer finding 1> | Critical/Important/Minor | <one-line fix summary> | `path/to/file.ts:L-L` |

### Other notes (if any)
```

## Step 4 — Hand off

Tell the user: "Fixes applied. Run `/lean-spec:submit-review <slug>` to re-review."
"""
