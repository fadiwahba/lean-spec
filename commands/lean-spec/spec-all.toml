description = "Write spec.md for every feature currently in specifying phase (acts as architect in main session)"

prompt = """
Arguments: `{{args}}`

!{
python3 $HOME/.gemini/extensions/lean-spec/bin/spec_all.py "{{args}}"
}

For each slug listed above that is in `specifying` phase, act as the architect:

1. Read `features/<slug>/spec.md` (may be a skeleton).
2. Find the matching feature section in `docs/PRD.md` for this slug.
3. Write a complete `features/<slug>/spec.md` following the structure in `skills/writing-specs/SKILL.md`:
   - Frontmatter (slug, phase, blocks_on)
   - Scope
   - Acceptance Criteria (functional + visual if applicable)
   - Out of Scope
   - Coder Guardrails
4. Cap each spec at ~80 lines.

Work through slugs sequentially. After finishing all, report:
"spec-all complete — N features specced: <slug-list>.
Run /lean-spec:submit-implementation <slug> when ready to implement."

Note: model overrides from .lean-spec/rules.yaml do not apply in Gemini (fixed model).
"""
