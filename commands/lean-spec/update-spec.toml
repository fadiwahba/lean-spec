description = "Revise an existing spec.md (feature must be in specifying phase)"

prompt = """
Arguments: `{{args}}`  (first token = slug; rest = what to change)

!{
python3 << 'PYEOF'
import json, sys, os

args = '{{args}}'
parts = args.split(None, 1)
slug = parts[0] if parts else ''
brief = parts[1] if len(parts) > 1 else ''

if not slug:
    print("Usage: /lean-spec:update-spec <slug> [what to change]")
    sys.exit(1)

wf_path = f"features/{slug}/workflow.json"
if not os.path.exists(wf_path):
    print(f"Feature '{slug}' not found. Run /lean-spec:start-spec {slug} first.")
    sys.exit(1)

with open(wf_path) as f:
    data = json.load(f)

phase = data.get('phase', '')
if phase != 'specifying':
    print(f"/lean-spec:update-spec only works in 'specifying' phase. Current: '{phase}'.")
    print("(Once implementation has started, the spec is frozen. Close + re-open if you need a new direction.)")
    sys.exit(1)

spec_path = f"features/{slug}/spec.md"
print("Existing spec:")
print("---")
if os.path.exists(spec_path):
    with open(spec_path) as f:
        print(f.read(), end='')
else:
    print("(spec.md missing)")
print("---")
print()
print(f"Change request: {brief}")
PYEOF
}

# Note: model overrides in rules.yaml do not apply in Gemini (fixed model).
Act as the architect (no subagent in Gemini mode). Revise `features/<slug>/spec.md` per the change request above. Preserve the shape and cap (~80 lines) defined in `skills/writing-specs/SKILL.md`. If the change would break an AC, negotiate with the user before silently removing it.

After writing, tell the user: "Spec updated. Review and run `/lean-spec:submit-implementation <slug>` when ready."
"""
