description = "Create or locate a lean-spec feature folder and run the planning phase."

prompt = """
Follow the lean-spec manual workflow from GEMINI.md and .gemini/LEAN_SPEC_INSTRUCTIONS.md.

Run the planning phase for feature slug: {{args}}

Requirements:
- use `.gemini/lean-spec/templates/` as the template source
- scaffold `lean-spec/features/<slug>/spec.md`, `notes.md`, and `review.md`
- before writing scaffold files, fetch one shell-backed timestamp with:
  `date "+%Y-%m-%d %H:%M %Z"`
- this phase must run in the Gemini Pro session for the Architect role
- if this session is not the intended Pro session, stop and tell the human to switch sessions and rerun the command
- stop after `spec.md` is ready for review
- do not implement code in this phase
"""
