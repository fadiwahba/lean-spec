description = "Run the implementation or apply-fixes phase for a lean-spec feature."

prompt = """
Follow the lean-spec manual workflow from GEMINI.md and .gemini/LEAN_SPEC_INSTRUCTIONS.md.

Feature slug: {{args}}

Step 1 — Determine the active phase by reading review.md first:

Read `lean-spec/features/<slug>/review.md` before anything else.

- If review.md is EMPTY or does not exist:
  PHASE = initial-implementation
  PRIMARY TASK: implement the feature from spec.md

- If review.md contains a disposition of `review_clean` with NO open findings:
  PHASE = initial-implementation (re-run or re-entry)
  PRIMARY TASK: implement the feature from spec.md
  NOTE: if the feature already appears fully implemented, report that to the human and stop — do not re-implement.

- If review.md contains open findings (issues, action items, or a disposition that is NOT `review_clean`):
  PHASE = apply-fixes
  PRIMARY TASK: address every open finding listed in review.md
  Do NOT re-implement from scratch. Treat spec.md as reference context only.

Step 2 — Execute the active phase:

For PHASE = initial-implementation:
- read `lean-spec/features/<slug>/spec.md` and `notes.md`
- use `context7` before implementation when external library, framework, or tool behavior matters
- use `sequential_thinking` before implementation when the work is multi-step, risky, or ambiguous
- implement all acceptance criteria from spec.md
- update `notes.md` with blockers, deviations, and partial completion notes

For PHASE = apply-fixes:
- read `lean-spec/features/<slug>/spec.md` and `notes.md` as reference only
- work through every open finding in review.md in order
- for each finding: implement the fix, verify it is resolved
- use `sequential_thinking` when a fix is multi-step or has side-effects
- update `notes.md` with what was fixed, what was skipped, and why
- do not reopen or re-litigate findings already marked RESOLVED

Shared rules:
- use `context7` when external library, framework, or tool behavior matters
- use `sequential_thinking` when the work is multi-step, risky, or ambiguous
- for frontend/UI work, use `playwright` before reporting complete, unless explicitly unavailable
- if `playwright` is used, close any opened browser, context, or page before ending the phase
- do not save Playwright screenshots into the project root; save only under `lean-spec/features/<slug>/artifacts/`
- if you start a local dev server or open a validation port, stop it before ending the phase
- update `notes.md` with blockers, deviations, or partial notes
- do not rewrite `spec.md` or `review.md`
- do not update `spec.md` status, checklist items, or timestamps
- do not bypass the Coder role for small or one-line fixes
- if required verification cannot be completed, report incomplete and stop
- stop after the implementation or fixes pass; do not auto-advance to review

End by reporting:
- detected PHASE (initial-implementation or apply-fixes)
- implementation complete / partial / blocked
- which findings were addressed (apply-fixes phase only)
- whether `context7`, `sequential_thinking`, and `playwright` were used or unavailable
- next manual phase the human should run
"""
